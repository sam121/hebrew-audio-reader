<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hebrew Reader</title>
  <style>
    :root {
      --bg: #f6efe4;
      --sand: #efe1cd;
      --panel: rgba(255, 251, 245, 0.93);
      --panel-strong: rgba(255, 253, 248, 0.98);
      --ink: #29231d;
      --muted: #726559;
      --accent: #935036;
      --accent-soft: rgba(147, 80, 54, 0.12);
      --accent-strong: #6f3723;
      --border: rgba(93, 69, 52, 0.16);
      --shadow: 0 24px 60px rgba(77, 54, 36, 0.13);
      --radius: 24px;
      --success: #295944;
      --warning: #a45831;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 247, 233, 0.95), transparent 36%),
        linear-gradient(135deg, var(--bg), #f7f1e8 48%, var(--sand));
      font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    }

    body {
      padding: 24px;
    }

    .shell {
      max-width: 1480px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hero,
    .page-panel,
    .transcript-panel,
    .message-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .hero,
    .page-panel,
    .transcript-panel {
      padding: 20px 24px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: end;
    }

    .eyebrow,
    .panel-label,
    .line-label,
    .page-counter,
    .helper,
    .line-badge,
    .status-chip {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.74rem;
      font-weight: 700;
      color: var(--muted);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      margin-top: 10px;
      font-size: clamp(2.1rem, 3vw, 3.4rem);
      line-height: 1.03;
      max-width: 12ch;
    }

    .lede {
      margin-top: 12px;
      max-width: 72ch;
      line-height: 1.6;
      color: var(--muted);
    }

    .toolbar-actions,
    .playback-actions,
    .line-actions,
    .nav-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(380px, 0.96fr) minmax(420px, 1.04fr);
      gap: 18px;
      align-items: start;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 15px;
      background: var(--accent);
      color: #fff8f3;
      cursor: pointer;
      font: inherit;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      font-weight: 700;
      letter-spacing: 0.01em;
      transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease, border-color 160ms ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(108, 61, 42, 0.18);
    }

    button.secondary {
      background: transparent;
      color: var(--ink);
      border: 1px solid rgba(106, 77, 57, 0.18);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    button.ghost {
      background: rgba(255, 248, 242, 0.88);
      color: var(--accent);
      border: 1px solid rgba(147, 80, 54, 0.16);
      box-shadow: none;
    }

    button:disabled {
      opacity: 0.48;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .status-chip {
      color: var(--success);
    }

    .panel-heading {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      flex-wrap: wrap;
    }

    .page-panel,
    .transcript-panel {
      display: grid;
      gap: 18px;
      align-self: start;
    }

    .page-panel {
      position: sticky;
      top: 18px;
      max-height: calc(100vh - 36px);
      overflow: auto;
      scrollbar-gutter: stable;
    }

    .image-frame {
      min-height: 440px;
      padding: 16px;
      border-radius: 20px;
      background:
        linear-gradient(180deg, rgba(103, 77, 57, 0.11), transparent 22%),
        #f2e8d8;
      border: 1px solid rgba(94, 67, 48, 0.12);
      display: grid;
      place-items: center;
    }

    .image-wrap {
      position: relative;
      display: inline-block;
      width: fit-content;
      max-width: 100%;
    }

    .image-wrap img {
      max-width: 100%;
      max-height: min(70vh, 980px);
      width: auto;
      height: auto;
      display: block;
      background: white;
      border-radius: 14px;
      box-shadow: 0 18px 34px rgba(63, 44, 31, 0.18);
    }

    .image-wrap img.loading {
      opacity: 0.72;
    }

    .overlay-layer {
      position: absolute;
      inset: 0;
      overflow: visible;
      pointer-events: none;
    }

    .line-overlay {
      position: absolute;
      width: auto;
      height: auto;
      pointer-events: none;
      opacity: 0;
      z-index: 3;
      transform: translate(0, -50%);
      transition: opacity 140ms ease, transform 140ms ease;
      color: #ff2a1f;
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 2px 8px rgba(134, 9, 0, 0.32);
    }

    .line-overlay.active {
      opacity: 1;
      transform: translate(-2px, -50%);
    }

    .notes {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      display: grid;
      gap: 8px;
      line-height: 1.5;
    }

    .page-playback {
      padding: 16px;
      border-radius: 20px;
      background: var(--panel-strong);
      border: 1px solid rgba(83, 61, 46, 0.11);
      display: grid;
      gap: 12px;
    }

    .line-list {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .section-block {
      display: grid;
      gap: 12px;
    }

    .section-heading {
      padding: 16px 18px;
      border-radius: 20px;
      background: rgba(255, 252, 248, 0.9);
      border: 1px solid rgba(84, 61, 46, 0.1);
      box-shadow: 0 12px 20px rgba(87, 60, 42, 0.05);
    }

    .section-heading-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      flex-wrap: wrap;
    }

    .section-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .section-description {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.5;
    }

    .section-line-stack {
      display: grid;
      gap: 14px;
    }

    .section-line-item {
      display: grid;
      gap: 10px;
    }

    .section-line-item + .section-line-item {
      padding-top: 14px;
      border-top: 1px solid rgba(120, 89, 65, 0.12);
    }

    .line-card {
      padding: 16px;
      border-radius: 20px;
      background: var(--panel-strong);
      border: 1px solid rgba(84, 61, 46, 0.11);
      display: grid;
      gap: 14px;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .line-card.active {
      border-color: rgba(147, 80, 54, 0.42);
      box-shadow: 0 16px 28px rgba(97, 63, 41, 0.12);
      transform: translateY(-1px);
    }

    .line-card.active .line-badge,
    .line-card.active .printed-hebrew {
      background: rgba(147, 80, 54, 0.16);
      border-color: rgba(147, 80, 54, 0.28);
    }

    .line-heading {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: start;
      flex-wrap: wrap;
    }

    .line-heading-main {
      display: grid;
      gap: 6px;
    }

    .line-reading {
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      gap: 14px;
    }

    .line-display-text {
      margin: 0;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(147, 80, 54, 0.06);
      border: 1px solid rgba(147, 80, 54, 0.12);
      color: var(--ink);
      line-height: 1.55;
      white-space: pre-wrap;
      unicode-bidi: plaintext;
      font-size: 1rem;
    }

    .line-display-text.hebrew {
      text-align: right;
      direction: rtl;
      font-family: "Times New Roman", "Noto Serif Hebrew", "David", serif;
      font-size: clamp(1.35rem, 1.9vw, 1.7rem);
    }

    .line-display-text.mixed {
      direction: auto;
    }

    .line-reading-arrow {
      min-width: 98px;
      margin-top: 16px;
      color: #ff2a1f;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: right;
      text-shadow: 0 2px 8px rgba(134, 9, 0, 0.2);
    }

    .line-title-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .line-badge {
      display: inline-grid;
      place-items: center;
      min-width: 34px;
      min-height: 34px;
      padding: 0 10px;
      border-radius: 999px;
      color: var(--accent-strong);
      background: rgba(147, 80, 54, 0.1);
      border: 1px solid rgba(147, 80, 54, 0.2);
      font-size: 0.78rem;
    }

    .line-help,
    .line-english {
      color: var(--muted);
      line-height: 1.5;
    }

    .page-guide {
      color: var(--muted);
      line-height: 1.5;
    }

    .printed-hebrew {
      margin: 0;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(147, 80, 54, 0.08);
      border: 1px solid rgba(147, 80, 54, 0.12);
      text-align: right;
      direction: rtl;
      unicode-bidi: plaintext;
      font-family: "Times New Roman", "Noto Serif Hebrew", "David", serif;
      font-size: clamp(1.45rem, 2vw, 1.85rem);
      line-height: 1.55;
    }

    .word-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      direction: rtl;
      justify-content: flex-end;
      align-items: flex-start;
    }

    .line-word-grid {
      flex: 1;
    }

    .word-chip {
      padding: 14px 18px;
      border-radius: 18px;
      border: 1px solid rgba(120, 89, 65, 0.18);
      background: rgba(255, 249, 243, 0.96);
      color: var(--ink);
      box-shadow: 0 8px 18px rgba(87, 60, 42, 0.06);
      font-size: clamp(1.6rem, 2.1vw, 2.05rem);
      direction: rtl;
      unicode-bidi: plaintext;
      font-family: "Times New Roman", "Noto Serif Hebrew", "David", serif;
      line-height: 1.1;
    }

    .word-chip:hover:not(:disabled) {
      background: rgba(255, 245, 234, 0.98);
    }

    .message-card {
      padding: 18px;
      line-height: 1.6;
      color: var(--muted);
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .hidden {
      display: none;
    }

    .shell {
      max-width: 1720px;
      gap: 16px;
    }

    .compact-header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .page-nav {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .workspace {
      grid-template-columns: minmax(620px, 1.28fr) minmax(330px, 0.72fr);
      gap: 16px;
    }

    .page-panel,
    .transcript-panel {
      padding: 16px;
      gap: 16px;
    }

    .page-panel {
      top: 12px;
      max-height: calc(100vh - 24px);
    }

    .image-frame {
      min-height: 0;
      padding: 8px;
    }

    .image-wrap {
      width: fit-content;
      max-width: 100%;
      display: inline-block;
    }

    .image-wrap img {
      width: auto;
      max-width: min(100%, 980px);
      max-height: min(86vh, 980px);
    }

    .page-playback {
      padding: 0;
      border: 0;
      background: transparent;
    }

    .simple-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .line-list,
    .section-block {
      gap: 12px;
    }

    .line-card {
      padding: 14px;
      gap: 12px;
    }

    .line-title {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
    }

    .line-card.active .line-title {
      color: var(--accent-strong);
    }

    @media (max-width: 1020px) {
      body {
        padding: 14px;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .page-panel {
        position: static;
        max-height: none;
        overflow: visible;
      }

      .image-wrap img {
        max-height: none;
        width: 100%;
      }
    }

    @media (max-width: 720px) {
      .page-panel,
      .transcript-panel {
        padding: 16px;
      }

      .compact-header {
        justify-content: stretch;
      }

      .page-nav {
        width: 100%;
        justify-content: space-between;
      }

      .word-chip {
        font-size: 1.35rem;
        padding: 12px 15px;
      }

      .line-reading {
        gap: 10px;
      }

      .line-reading-arrow {
        min-width: 78px;
        margin-top: 14px;
        font-size: 0.78rem;
      }

      .line-overlay {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="compact-header">
      <div class="page-nav">
        <button id="prevPage" class="secondary" type="button" disabled>Previous page</button>
        <button id="prevStartPage" class="secondary" type="button" disabled>Last start page</button>
        <p id="pageCounter" class="page-counter"></p>
        <button id="endPage" class="secondary" type="button" disabled>End page</button>
        <button id="nextPage" type="button" disabled>Next page</button>
      </div>
    </header>

    <main class="workspace">
      <section class="page-panel">
        <div class="image-frame">
          <div class="image-wrap">
            <img id="pageImage" alt="Current book page" decoding="sync" loading="eager" fetchpriority="high">
            <div id="overlayLayer" class="overlay-layer"></div>
          </div>
        </div>
      </section>

      <section class="transcript-panel">
        <section class="page-playback">
          <div class="simple-actions">
            <button id="playWholePage" type="button" disabled>Play whole page</button>
            <button id="playDrills" class="secondary" type="button" disabled>Play drills</button>
            <button id="stopPlayback" class="ghost" type="button">Stop</button>
          </div>
        </section>

        <div id="lineList" class="line-list"></div>
        <section id="emptyState" class="message-card hidden">
          This page does not have verified transcript lines yet.
        </section>
      </section>
    </main>
  </div>

  <p id="playbackStatus" class="visually-hidden" aria-live="polite">Loading site data...</p>
  <p id="audioSummary" class="visually-hidden" aria-live="polite"></p>

  <script>
    const state = {
      reader: null,
      currentPageIndex: 0,
      currentAudio: null,
      playbackToken: 0,
      activeLineId: null,
      pageImageLoadToken: 0,
      preloadedImages: new Map()
    };

    const elements = {
      audioSummary: document.getElementById("audioSummary"),
      emptyState: document.getElementById("emptyState"),
      lineList: document.getElementById("lineList"),
      nextPage: document.getElementById("nextPage"),
      overlayLayer: document.getElementById("overlayLayer"),
      pageCounter: document.getElementById("pageCounter"),
      pageImage: document.getElementById("pageImage"),
      playbackStatus: document.getElementById("playbackStatus"),
      playDrills: document.getElementById("playDrills"),
      playWholePage: document.getElementById("playWholePage"),
      prevStartPage: document.getElementById("prevStartPage"),
      prevPage: document.getElementById("prevPage"),
      endPage: document.getElementById("endPage"),
      stopPlayback: document.getElementById("stopPlayback")
    };

    function currentPage() {
      return state.reader.pages[state.currentPageIndex];
    }

    function isStartPage(page) {
      return orderedSections(page).some(function (section) {
        return section.playbackMode === "single_block";
      });
    }

    function previousStartPageIndex(fromIndex) {
      for (let index = fromIndex - 1; index >= 0; index -= 1) {
        if (isStartPage(state.reader.pages[index])) {
          return index;
        }
      }
      return -1;
    }

    function drillPlaybackGroups(page) {
      if (page.drillPlaybackGroups && page.drillPlaybackGroups.length) {
        return page.drillPlaybackGroups;
      }

      return orderedLines(page)
        .filter(function (line) {
          return line.hebrewPlaybackMode === "sequence" && line.hebrewAudioSequence && line.hebrewAudioSequence.length;
        })
        .map(function (line) {
          return {
            label: line.badgeLabel || line.label || line.id,
            lineId: line.id,
            urls: line.hebrewAudioSequence,
            gapMs: Number(line.sequenceGapMs) || 0
          };
        });
    }

    function currentPageWordsById(page) {
      const byId = new Map();
      page.words.forEach(function (word) {
        byId.set(word.id, word);
      });
      return byId;
    }

    function setStatus(message, tone) {
      elements.playbackStatus.textContent = message;
      elements.audioSummary.textContent = tone || "";
    }

    function scheduleIdle(callback) {
      if ("requestIdleCallback" in window) {
        window.requestIdleCallback(callback, { timeout: 800 });
        return;
      }

      window.setTimeout(callback, 80);
    }

    function preloadImage(url, fetchPriority) {
      if (!url || state.preloadedImages.has(url)) {
        return;
      }

      const image = new Image();
      image.decoding = "async";

      if (fetchPriority && "fetchPriority" in image) {
        image.fetchPriority = fetchPriority;
      }

      image.src = url;
      if (typeof image.decode === "function") {
        image.decode().catch(function () {
          return undefined;
        });
      }

      state.preloadedImages.set(url, image);
    }

    function markPageImageReady() {
      elements.pageImage.classList.remove("loading");
      elements.pageImage.removeAttribute("aria-busy");
    }

    function requestVisiblePageImage(page) {
      const sourceUrl = page.image;
      const token = state.pageImageLoadToken + 1;
      state.pageImageLoadToken = token;

      elements.pageImage.dataset.sourceUrl = sourceUrl;
      elements.pageImage.dataset.retryCount = "0";
      elements.pageImage.alt = "Scanned book page " + page.page;
      elements.pageImage.classList.add("loading");
      elements.pageImage.setAttribute("aria-busy", "true");
      elements.pageImage.decoding = "sync";
      elements.pageImage.loading = "eager";

      if ("fetchPriority" in elements.pageImage) {
        elements.pageImage.fetchPriority = "high";
      }

      preloadImage(sourceUrl, "high");
      if (elements.pageImage.getAttribute("src") !== sourceUrl) {
        elements.pageImage.src = sourceUrl;
      }

      const cached = state.preloadedImages.get(sourceUrl);
      if (cached && cached.complete && cached.naturalWidth > 0) {
        markPageImageReady();
        return;
      }

      window.setTimeout(function () {
        if (token !== state.pageImageLoadToken) {
          return;
        }

        if (elements.pageImage.complete && elements.pageImage.naturalWidth > 0) {
          markPageImageReady();
          return;
        }

        elements.pageImage.dataset.retryCount = "1";
        elements.pageImage.src = sourceUrl + (sourceUrl.indexOf("?") === -1 ? "?" : "&") + "retry=" + token;
      }, 1200);
    }

    function stopAudioOnly() {
      if (state.currentAudio) {
        state.currentAudio.pause();
        state.currentAudio.currentTime = 0;
        state.currentAudio = null;
      }
    }

    function stopPlayback(withMessage) {
      state.playbackToken += 1;
      stopAudioOnly();
      if (withMessage) {
        setStatus("Playback stopped.", "");
      }
    }

    function setActiveLine(lineId) {
      state.activeLineId = lineId || null;
      document.querySelectorAll(".line-card").forEach(function (card) {
        card.classList.toggle("active", card.dataset.lineId === state.activeLineId);
      });
      document.querySelectorAll(".line-overlay").forEach(function (overlay) {
        overlay.classList.toggle("active", overlay.dataset.lineId === state.activeLineId);
      });
    }

    function startPlayback(label, lineId) {
      stopPlayback(false);
      state.playbackToken += 1;
      setActiveLine(lineId || null);
      setStatus(label, "Playing");
      return state.playbackToken;
    }

    function playFile(url, token) {
      return new Promise(function (resolve, reject) {
        if (token !== state.playbackToken) {
          resolve(false);
          return;
        }

        const audio = new Audio(url);
        state.currentAudio = audio;

        audio.addEventListener("ended", function () {
          if (state.currentAudio === audio) {
            state.currentAudio = null;
          }
          resolve(true);
        });

        audio.addEventListener("error", function () {
          if (state.currentAudio === audio) {
            state.currentAudio = null;
          }
          reject(new Error("Audio failed to load: " + url));
        });

        const playResult = audio.play();
        if (playResult && typeof playResult.then === "function") {
          playResult.catch(function (error) {
            if (state.currentAudio === audio) {
              state.currentAudio = null;
            }
            reject(error);
          });
        }
      });
    }

    function pauseBetweenSequenceClips(gapMs, token) {
      const delay = Number(gapMs) || 0;
      if (delay <= 0) {
        return Promise.resolve(true);
      }

      return new Promise(function (resolve) {
        window.setTimeout(function () {
          resolve(token === state.playbackToken);
        }, delay);
      });
    }

    async function playSingle(url, label, lineId) {
      if (!url) {
        setStatus("Audio is not available for this item yet.", "Unavailable");
        return;
      }

      const token = startPlayback(label, lineId);
      try {
        await playFile(url, token);
        if (token === state.playbackToken) {
          setStatus(label + " finished.", "Ready");
        }
      } catch (error) {
        setStatus("Playback failed. Check the generated audio file.", "Error");
        console.error(error);
      }
    }

    async function playSequence(urls, label, lineId, gapMs) {
      const sequence = urls.filter(Boolean);
      if (!sequence.length) {
        setStatus("Audio is not available for this item yet.", "Unavailable");
        return;
      }

      const token = startPlayback(label, lineId);
      let skipped = 0;
      try {
        for (let index = 0; index < sequence.length; index += 1) {
          const url = sequence[index];
          if (token !== state.playbackToken) {
            return;
          }
          try {
            await playFile(url, token);
          } catch (error) {
            skipped += 1;
            console.error("Skipping broken clip in sequence", url, error);
          }

          if (index < sequence.length - 1) {
            const stillActive = await pauseBetweenSequenceClips(gapMs, token);
            if (!stillActive) {
              return;
            }
          }
        }
        if (token === state.playbackToken) {
          if (skipped === sequence.length) {
            setStatus("Playback failed. Every clip in this line was unavailable.", "Error");
            return;
          }
          setStatus(
            skipped ? label + " finished with " + skipped + " skipped clip" + (skipped === 1 ? "" : "s") + "." : label + " finished.",
            skipped ? "Partial" : "Ready"
          );
        }
      } catch (error) {
        setStatus("Playback failed. Check the generated audio file.", "Error");
        console.error(error);
      }
    }

    async function playGroups(groups, label) {
      const preparedGroups = groups
        .map(function (group) {
          return {
            label: group.label,
            lineId: group.lineId || null,
            urls: (group.urls || []).filter(Boolean),
            gapMs: Number(group.gapMs) || 0
          };
        })
        .filter(function (group) {
          return group.urls.length;
        });

      if (!preparedGroups.length) {
        setStatus("Audio is not available for this item yet.", "Unavailable");
        return;
      }

      const token = startPlayback(label, null);
      let skipped = 0;
      let attempted = 0;
      try {
        for (const group of preparedGroups) {
          if (token !== state.playbackToken) {
            return;
          }

          setActiveLine(group.lineId);

          for (let index = 0; index < group.urls.length; index += 1) {
            const url = group.urls[index];
            if (token !== state.playbackToken) {
              return;
            }
            attempted += 1;
            try {
              await playFile(url, token);
            } catch (error) {
              skipped += 1;
              console.error("Skipping broken clip in grouped playback", url, error);
            }

            if (index < group.urls.length - 1) {
              const stillActive = await pauseBetweenSequenceClips(group.gapMs, token);
              if (!stillActive) {
                return;
              }
            }
          }
        }

        if (token === state.playbackToken) {
          if (attempted && skipped === attempted) {
            setStatus("Playback failed. Every clip in this section was unavailable.", "Error");
            return;
          }
          setStatus(
            skipped ? label + " finished with " + skipped + " skipped clip" + (skipped === 1 ? "" : "s") + "." : label + " finished.",
            skipped ? "Partial" : "Ready"
          );
        }
      } catch (error) {
        setStatus("Playback failed. Check the generated audio file.", "Error");
        console.error(error);
      }
    }

    function orderedLines(page) {
      return page.lines.slice().sort(function (a, b) {
        return a.order - b.order;
      });
    }

    function preloadPageAssets(pageIndex, options) {
      if (!state.reader || pageIndex < 0 || pageIndex >= state.reader.pages.length) {
        return;
      }

      const page = state.reader.pages[pageIndex];
      const includeStrips = !options || options.includeStrips !== false;
      preloadImage(page.image, options && options.pagePriority ? options.pagePriority : null);

      if (!includeStrips) {
        return;
      }

      orderedLines(page).forEach(function (line) {
        if (line.stripImage) {
          preloadImage(line.stripImage, "low");
        }
      });
    }

    function warmNearbyPages(pageIndex) {
      preloadPageAssets(pageIndex, { pagePriority: "high" });
      preloadPageAssets(pageIndex + 1, { pagePriority: "high" });

      scheduleIdle(function () {
        preloadPageAssets(pageIndex - 1);
        preloadPageAssets(pageIndex + 2, { includeStrips: false });
      });
    }

    function orderedSections(page) {
      if (page.sections && page.sections.length) {
        return page.sections.slice().sort(function (a, b) {
          return a.order - b.order;
        });
      }

      return [
        {
          id: "default",
          order: 1,
          title: "Transcript",
          description: "",
          hiddenHeading: true
        }
      ];
    }

    function sectionsById(page) {
      const byId = new Map();
      orderedSections(page).forEach(function (section) {
        byId.set(section.id, section);
      });
      return byId;
    }

    function resolvedRegion(line) {
      return line.region || line.overlay || null;
    }

    function effectiveMatchMode(line, section) {
      const requestedMode = line.matchMode || (section && section.matchMode) || (resolvedRegion(line) ? "hybrid" : "none");
      const region = resolvedRegion(line);

      if (requestedMode === "none") {
        return "none";
      }

      if (!region) {
        return "strip_only";
      }

      if (typeof region.confidence === "number" && region.confidence < 0.85) {
        return "strip_only";
      }

      return requestedMode;
    }

    function paddedRegion(region) {
      if (!region) {
        return null;
      }

      const left = Math.max(0, region.left - (region.padLeft || 0));
      const top = Math.max(0, region.top - (region.padTop || 0));
      const right = Math.min(100, region.left + region.width + (region.padRight || 0));
      const bottom = Math.min(100, region.top + region.height + (region.padBottom || 0));

      return {
        left: left,
        top: top,
        width: Math.max(0, right - left),
        height: Math.max(0, bottom - top)
      };
    }

    function firstMatchableLine(page) {
      const pageSections = sectionsById(page);
      return orderedLines(page).find(function (line) {
        const section = pageSections.get(line.sectionId || "default");
        return effectiveMatchMode(line, section) === "hybrid";
      }) || orderedLines(page)[0] || null;
    }

    function updateActiveFromEvent(lineId) {
      if (lineId) {
        setActiveLine(lineId);
      }
    }

    function renderOverlays(page) {
      const pageSections = sectionsById(page);
      elements.overlayLayer.replaceChildren();

      orderedLines(page).forEach(function (line) {
        const section = pageSections.get(line.sectionId || "default");
        if (effectiveMatchMode(line, section) !== "hybrid") {
          return;
        }

        const region = paddedRegion(resolvedRegion(line));
        if (!region || !region.width || !region.height) {
          return;
        }

        const overlay = document.createElement("div");
        overlay.className = "line-overlay";
        overlay.dataset.lineId = line.id;
        overlay.style.top = region.top + (region.height / 2) + "%";
        overlay.style.left = Math.max(1.4, region.left - 3.8) + "%";
        overlay.title = line.badgeLabel || line.label || line.id;
        overlay.textContent = "➜";

        elements.overlayLayer.appendChild(overlay);
      });

      setActiveLine(state.activeLineId);
    }

    function renderLines(page) {
      const wordsById = currentPageWordsById(page);
      elements.lineList.replaceChildren();

      if (!page.lines.length) {
        elements.emptyState.classList.remove("hidden");
        return;
      }

      elements.emptyState.classList.add("hidden");

      orderedSections(page).forEach(function (section) {
        const sectionLines = orderedLines(page).filter(function (line) {
          return (line.sectionId || "default") === section.id;
        });
        const sectionIsSingleBlock = section.playbackMode === "single_block";

        if (!sectionLines.length || sectionIsSingleBlock) {
          return;
        }

        const sectionBlock = document.createElement("section");
        sectionBlock.className = "section-block";

        const sectionList = document.createElement("div");
        sectionList.className = "line-list";

        sectionLines.forEach(function (line, sectionLineIndex) {
          const card = document.createElement("section");
          card.className = "line-card";
          card.dataset.lineId = line.id;

          card.addEventListener("mouseenter", function () {
            updateActiveFromEvent(line.id);
          });

          card.addEventListener("focusin", function () {
            updateActiveFromEvent(line.id);
          });

          card.addEventListener("click", function (event) {
            if (!event.target.closest("button")) {
              setActiveLine(line.id);
            }
          });

          const heading = document.createElement("div");
          heading.className = "line-heading-main";

          const title = document.createElement("h3");
          title.className = "line-title";
          title.textContent = "Line " + String(sectionLineIndex + 1);
          heading.appendChild(title);

          const actions = document.createElement("div");
          actions.className = "line-actions";

          const hebrewLineAudio = line.audio && line.audio.he ? line.audio.he.line : null;
          const englishLineAudio = line.audio && line.audio.en ? line.audio.en.line : null;
          const mixedLineAudio = line.audio && line.audio.mixed ? line.audio.mixed.line : null;
          const hebrewPlaybackMode = line.hebrewPlaybackMode === "sequence" ? "sequence" : "continuous";
          const sequenceGapMs = Number(line.sequenceGapMs) || 0;
          if (mixedLineAudio || hebrewLineAudio || englishLineAudio || (line.hebrewAudioSequence && line.hebrewAudioSequence.length)) {
            const playHebrew = document.createElement("button");
            playHebrew.type = "button";
            playHebrew.textContent = "Play whole line";
            playHebrew.addEventListener("click", function () {
              if (hebrewPlaybackMode === "sequence" && line.hebrewAudioSequence && line.hebrewAudioSequence.length) {
                playSequence(line.hebrewAudioSequence || [], line.label + " in Hebrew", line.id, sequenceGapMs);
                return;
              }
              if (mixedLineAudio) {
                playSingle(mixedLineAudio, line.label, line.id);
                return;
              }
              if (hebrewLineAudio) {
                playSingle(hebrewLineAudio, line.label + " in Hebrew", line.id);
                return;
              }
              if (englishLineAudio) {
                playSingle(englishLineAudio, line.label + " in English", line.id);
                return;
              }
              playSequence(line.hebrewAudioSequence || [], line.label + " in Hebrew", line.id, sequenceGapMs);
            });
            actions.appendChild(playHebrew);
          }

          card.appendChild(heading);

          const hasWordIds = line.wordIds && line.wordIds.length;
          const contentMode = line.contentMode || (hasWordIds ? "hebrew" : "english");
          const shouldShowDisplayText = Boolean(
            line.displayText && (!hasWordIds || contentMode === "mixed" || contentMode === "english" || contentMode === "other")
          );

          if (shouldShowDisplayText) {
            const displayText = document.createElement("p");
            displayText.className = "line-display-text";
            if (contentMode === "hebrew") {
              displayText.classList.add("hebrew");
              displayText.lang = "he";
              displayText.dir = "rtl";
            } else if (contentMode === "mixed") {
              displayText.classList.add("mixed");
              displayText.dir = "auto";
            } else {
              displayText.dir = "auto";
            }
            displayText.textContent = line.displayText;
            card.appendChild(displayText);
          }

          if (hasWordIds) {
            const lineReading = document.createElement("div");
            lineReading.className = "line-reading";

            const wordGrid = document.createElement("div");
            wordGrid.className = "word-grid line-word-grid";
            wordGrid.lang = "he";
            wordGrid.dir = "rtl";

            const displayWords = Array.isArray(line.displayWords) && line.displayWords.length === line.wordIds.length
              ? line.displayWords
              : null;

            line.wordIds.forEach(function (wordId, index) {
              const word = wordsById.get(wordId);
              if (!word) {
                return;
              }

              const chip = document.createElement("button");
              chip.type = "button";
              chip.className = "word-chip";
              chip.textContent = displayWords ? displayWords[index] : word.displayText;
              chip.disabled = !word.audio || !word.audio.he || !word.audio.he.word;
              chip.title = word.spokenText;
              chip.addEventListener("click", function () {
                playSingle(word.audio.he.word, "Hebrew word: " + word.spokenText, line.id);
              });
              wordGrid.appendChild(chip);
            });

            lineReading.appendChild(wordGrid);
            card.appendChild(lineReading);
          }

          if (actions.childNodes.length) {
            card.appendChild(actions);
          }

          sectionList.appendChild(card);
        });

        sectionBlock.appendChild(sectionList);
        elements.lineList.appendChild(sectionBlock);
      });

      setActiveLine(state.activeLineId);
    }

    function renderPage() {
      const page = currentPage();
      const initialLine = firstMatchableLine(page);
      state.activeLineId = initialLine ? initialLine.id : null;

      elements.pageCounter.textContent = "Page " + (state.currentPageIndex + 1) + " of " + state.reader.pages.length;
      requestVisiblePageImage(page);
      document.title = "Hebrew Reader - Page " + page.page;
      elements.prevPage.disabled = state.currentPageIndex === 0;
      elements.nextPage.disabled = state.currentPageIndex === state.reader.pages.length - 1;
      elements.prevStartPage.disabled = previousStartPageIndex(state.currentPageIndex) === -1;
      elements.endPage.disabled = state.currentPageIndex === state.reader.pages.length - 1;
      elements.playWholePage.disabled = !(page.fullPlaybackGroups && page.fullPlaybackGroups.length);
      elements.playDrills.disabled = !drillPlaybackGroups(page).length;

      renderLines(page);
      renderOverlays(page);
      warmNearbyPages(state.currentPageIndex);

      setStatus(
        page.status === "verified" ? "Ready." : "This page is visible, but it does not have verified audio yet.",
        page.status === "verified" ? "Ready" : "Pending"
      );
    }

    function movePage(delta) {
      if (!state.reader) {
        return;
      }

      const nextIndex = state.currentPageIndex + delta;
      if (nextIndex < 0 || nextIndex >= state.reader.pages.length) {
        return;
      }

      stopPlayback(false);
      state.currentPageIndex = nextIndex;
      renderPage();
    }

    async function loadReader() {
      try {
        const response = await fetch("./data/reader.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Reader data fetch failed: " + response.status);
        }

        state.reader = await response.json();
        preloadPageAssets(0, { pagePriority: "high" });
        preloadPageAssets(1, { pagePriority: "high" });
        renderPage();
      } catch (error) {
        setStatus("Site data could not be loaded. Run the build step first.", "Error");
        console.error(error);
      }
    }

    elements.prevPage.addEventListener("click", function () {
      movePage(-1);
    });

    elements.nextPage.addEventListener("click", function () {
      movePage(1);
    });

    elements.prevStartPage.addEventListener("click", function () {
      if (!state.reader) {
        return;
      }
      const previousIndex = previousStartPageIndex(state.currentPageIndex);
      if (previousIndex === -1) {
        return;
      }
      stopPlayback(false);
      state.currentPageIndex = previousIndex;
      renderPage();
    });

    elements.endPage.addEventListener("click", function () {
      if (!state.reader || state.currentPageIndex === state.reader.pages.length - 1) {
        return;
      }
      stopPlayback(false);
      state.currentPageIndex = state.reader.pages.length - 1;
      renderPage();
    });

    elements.playWholePage.addEventListener("click", function () {
      const page = currentPage();
      playGroups(page.fullPlaybackGroups || [], "Page " + page.page);
    });

    elements.playDrills.addEventListener("click", function () {
      const page = currentPage();
      playGroups(drillPlaybackGroups(page), "Page " + page.page + " drills");
    });

    elements.pageImage.addEventListener("load", function () {
      markPageImageReady();
    });

    elements.pageImage.addEventListener("error", function () {
      const sourceUrl = elements.pageImage.dataset.sourceUrl;
      if (!sourceUrl) {
        return;
      }

      const retryCount = Number(elements.pageImage.dataset.retryCount || "0");
      if (retryCount < 1) {
        elements.pageImage.dataset.retryCount = String(retryCount + 1);
        elements.pageImage.src = sourceUrl + (sourceUrl.indexOf("?") === -1 ? "?" : "&") + "retry=" + Date.now();
        return;
      }

      elements.pageImage.classList.remove("loading");
      elements.pageImage.removeAttribute("aria-busy");
      setStatus("The page image had trouble loading. Try refreshing if it stays blank.", "Image");
    });

    elements.stopPlayback.addEventListener("click", function () {
      stopPlayback(true);
    });

    window.addEventListener("keydown", function (event) {
      if (event.key === "ArrowLeft") {
        movePage(-1);
      } else if (event.key === "ArrowRight") {
        movePage(1);
      }
    });

    loadReader();
  </script>
</body>
</html>
