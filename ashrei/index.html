<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hebrew Prayer Line Practice</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="kicker">Hebrew Prayer</p>
        <h1 id="prayerTitle">Line Practice</h1>
      </div>
      <label class="loop-control">
        <input id="loopToggle" type="checkbox">
        <span>Loop current line</span>
      </label>
    </header>

    <nav id="tabs" class="tabs" aria-label="Prayer selection"></nav>

    <section id="videoLink" class="video-link" aria-live="polite"></section>

    <main id="lines" class="lines" aria-live="polite"></main>

    <footer>
      <p id="sourceNote">Choose a prayer above, then play one line at a time.</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
