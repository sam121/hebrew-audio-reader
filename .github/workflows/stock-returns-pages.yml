name: Deploy Stock Returns Chart

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "stock-returns/**"
      - ".github/workflows/stock-returns-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: stock-returns-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build static chart
        run: python stock-returns/build_total_return_chart.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: stock-returns/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
